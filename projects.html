<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Works — Arsh Prem</title>
  <meta name="description" content="Projects by Arsh Prem — web apps, AI systems, and full-stack solutions.">
  <link rel="icon" href="images/icon.png" type="image/png">
  <link rel="stylesheet" href="assets/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" defer></script>
</head>
<body>
  <nav class="nav" id="navbar"><div class="nav-inner"><a href="index.html" class="nav-logo"><span>ARSH</span><span>PREM</span></a><div class="nav-links"><a href="about.html" class="nav-link">[ ABOUT ME ]</a><a href="projects.html" class="nav-link active">[ WORKS ]</a><a href="certificates.html" class="nav-link">[ CERTIFICATES ]</a><a href="blog.html" class="nav-link">[ BLOG ]</a></div><a href="contact.html" class="nav-contact">CONTACT ME ↗</a><button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Toggle menu"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg></button></div></nav>
  <div class="mobile-menu" id="mobile-menu"><a href="index.html">Home</a><a href="about.html">About</a><a href="projects.html">Works</a><a href="certificates.html">Certificates</a><a href="blog.html">Blog</a><a href="contact.html">Contact</a></div>

  <main>
    <div class="container">
      <div class="page-header">
        <span class="page-header-label anim">01 — PORTFOLIO</span>
        <h1 class="page-header-title anim anim-delay-1">SELECTED<br>WORKS</h1>
        <p class="page-header-desc anim anim-delay-2">A curated collection of digital products, systems, and experiences I've built.</p>
      </div>
      <div id="projects-container" class="grid-3 anim anim-delay-3"></div>
    </div>
  </main>

  <footer class="footer" style="margin-top: 4rem;"><div class="container-wide"><div class="footer-inner"><span class="footer-copy">© 2024 ARSH PREM</span><div class="footer-links"><a href="https://github.com/arshprem01" target="_blank" class="footer-link">GITHUB</a><a href="https://www.linkedin.com/in/arsh-prem-0606542b7" target="_blank" class="footer-link">LINKEDIN</a></div></div></div></footer>

  <script>
    document.getElementById('mobile-menu-btn')?.addEventListener('click', () => { document.getElementById('mobile-menu')?.classList.toggle('open'); });
    window.addEventListener('scroll', () => { document.getElementById('navbar')?.classList.toggle('scrolled', window.scrollY > 50); });

    fetch('projects.csv').then(r => r.text()).then(data => {
      const container = document.getElementById('projects-container');
      const rows = data.split('\n');
      for (let i = 1; i < rows.length; i++) {
        if (!rows[i].trim()) continue;
        const [title, year, category, image, link] = rows[i].split(',');
        const imgHtml = image && image.includes('.') ?
          `<img src="${image}" alt="${title}">` :
          `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--light-gray);"><span class="font-display" style="font-size:3rem;font-weight:900;color:var(--mid-gray);">${image || ''}</span></div>`;
        container.innerHTML += `
          <a href="${link}" target="_blank" class="card" id="project-${i}">
            <div class="card-img-wrap">${imgHtml}</div>
            <div class="card-body">
              <h3 class="card-title">${title}</h3>
              <div class="card-meta"><span class="card-category">${category}</span><span class="card-year">${year}</span></div>
              <div class="card-arrow">VIEW PROJECT →</div>
            </div>
          </a>`;
      }
    }).catch(e => console.error(e));
  </script>
  <script src="assets/gsap-animations.js" defer></script>
</body>
</html>
