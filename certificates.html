<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>

  <div class="mobile-menu" id="mobile-menu"><a href="index.html">Home</a><a href="about.html">About</a><a href="projects.html">Works</a><a href="certificates.html">Certificates</a><a href="blog.html">Blog</a><a href="contact.html">Contact</a></div>

  <main>
    <div class="container">
      <div class="page-header">
        <span class="page-header-label anim">02 — ACHIEVEMENTS</span>
        <h1 class="page-header-title anim anim-delay-1">CERTIFICATES</h1>
        <p class="page-header-desc anim anim-delay-2">Professional certifications earned through continuous learning and dedication.</p>
      </div>
      <div id="certs-container" class="grid-3 anim anim-delay-3"></div>
    </div>
  </main>

  <footer class="footer" style="margin-top: 4rem;"><div class="container-wide"><div class="footer-inner"><span class="footer-copy">© 2024 ARSH PREM</span><div class="footer-links"><a href="https://github.com/arshprem01" target="_blank" class="footer-link">GITHUB</a><a href="https://www.linkedin.com/in/arsh-prem-0606542b7" target="_blank" class="footer-link">LINKEDIN</a></div></div></div></footer>

  <script>
    document.getElementById('mobile-menu-btn')?.addEventListener('click', () => { document.getElementById('mobile-menu')?.classList.toggle('open'); });
    window.addEventListener('scroll', () => { document.getElementById('navbar')?.classList.toggle('scrolled', window.scrollY > 50); });

    function parseCSV(text) {
      const lines = text.split('\n'), headers = lines[0].split(',').map(h => h.trim()), data = [];
      for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim(); if (!line) continue;
        const row = {}; let val = '', inQ = false, col = 0;
        for (let j = 0; j < line.length; j++) {
          if (line[j] === '"') inQ = !inQ;
          else if (line[j] === ',' && !inQ) { row[headers[col]] = val.trim().replace(/^"|"$/g, ''); val = ''; col++; }
          else val += line[j];
        }
        if (col < headers.length) row[headers[col]] = val.trim().replace(/^"|"$/g, '');
        data.push(row);
      }
      return data;
    }

    fetch('certificates.csv').then(r => r.text()).then(data => {
      const certs = parseCSV(data), container = document.getElementById('certs-container');
      certs.forEach(cert => {
        const src = (cert.Image || '').trim(), ext = src.toLowerCase();
        let imgHtml;
        if (ext.endsWith('.png') || ext.endsWith('.jpg') || ext.endsWith('.jpeg') || ext.endsWith('.webp')) {
          imgHtml = `<img src="${src}" alt="${cert.Title}" style="width:100%;height:100%;object-fit:contain;filter:grayscale(1);transition:filter 0.5s;">`;
        } else if (ext.endsWith('.pdf')) {
          imgHtml = `<div style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.5rem;background:var(--light-gray);"><span style="font-size:2rem;">📄</span><span class="font-mono" style="font-size:0.6rem;color:var(--dark-gray);text-transform:uppercase;">VIEW PDF</span></div>`;
        } else {
          imgHtml = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--light-gray);"><span class="font-display" style="font-size:2rem;color:var(--mid-gray);">CERT</span></div>`;
        }
        container.innerHTML += `
          <a href="${src}" target="_blank" class="card">
            <div class="card-img-wrap" style="aspect-ratio:4/3;">${imgHtml}</div>
            <div class="card-body">
              <h3 class="card-title" style="font-size:0.95rem;">${cert.Title}</h3>
              <div class="card-meta"><span class="card-category">${cert.Issuer || ''}</span><span class="card-year">${cert.Year || ''}</span></div>
              <p style="font-size:0.75rem;color:var(--dark-gray);line-height:1.6;margin-top:0.5rem;">${cert.Description || ''}</p>
            </div>
          </a>`;
      });
    }).catch(e => console.error(e));
  </script>
  <script src="assets/gsap-animations.js" defer></script>
</body>
</html>
