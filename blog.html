<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Arsh Prem</title>
  <meta name="description" content="Thoughts on software engineering and technology by Arsh Prem.">
  <link rel="icon" href="images/icon.png" type="image/png">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <nav class="nav" id="navbar"><div class="nav-inner"><a href="index.html" class="nav-logo"><span>ARSH</span><span>PREM</span></a><div class="nav-links"><a href="about.html" class="nav-link">[ ABOUT ME ]</a><a href="projects.html" class="nav-link">[ WORKS ]</a><a href="certificates.html" class="nav-link">[ CERTIFICATES ]</a><a href="blog.html" class="nav-link active">[ BLOG ]</a></div><a href="contact.html" class="nav-contact">CONTACT ME ↗</a><button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Toggle menu"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg></button></div></nav>
  <div class="mobile-menu" id="mobile-menu"><a href="index.html">Home</a><a href="about.html">About</a><a href="projects.html">Works</a><a href="certificates.html">Certificates</a><a href="blog.html">Blog</a><a href="contact.html">Contact</a></div>

  <main>
    <div class="container">
      <div class="page-header">
        <span class="page-header-label anim">03 — THOUGHTS</span>
        <h1 class="page-header-title anim anim-delay-1">BLOG</h1>
        <p class="page-header-desc anim anim-delay-2">Notes, reflections, and dispatches from the field.</p>
      </div>
      <div id="blog-grid" class="grid-3 anim anim-delay-3"></div>
    </div>
  </main>

  <footer class="footer" style="margin-top: 4rem;"><div class="container-wide"><div class="footer-inner"><span class="footer-copy">© 2024 ARSH PREM</span><div class="footer-links"><a href="https://github.com/arshprem01" target="_blank" class="footer-link">GITHUB</a><a href="https://www.linkedin.com/in/arsh-prem-0606542b7" target="_blank" class="footer-link">LINKEDIN</a></div></div></div></footer>

  <script>
    document.getElementById('mobile-menu-btn')?.addEventListener('click', () => { document.getElementById('mobile-menu')?.classList.toggle('open'); });
    window.addEventListener('scroll', () => { document.getElementById('navbar')?.classList.toggle('scrolled', window.scrollY > 50); });
    const obs = new IntersectionObserver((entries) => { entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }); }, { threshold: 0.1 });
    document.querySelectorAll('.anim').forEach(el => obs.observe(el));

    function parseCSVLine(line) {
      const result = []; let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        if (line[i] === '"') inQ = !inQ;
        else if (line[i] === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
        else cur += line[i];
      }
      result.push(cur.trim());
      return result;
    }

    fetch('blog.csv').then(r => r.text()).then(csv => {
      const lines = csv.trim().split('\n'), grid = document.getElementById('blog-grid');
      for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        const [title, date, category, summary, image] = parseCSVLine(lines[i]);
        const imgHtml = image && image.trim() ?
          `<img src="${image.trim()}" alt="${title}" style="width:100%;height:100%;object-fit:cover;filter:grayscale(1);transition:filter 0.5s;">` :
          `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--light-gray);"><span class="font-display" style="font-size:2rem;color:var(--mid-gray);">POST</span></div>`;
        grid.innerHTML += `
          <div class="card">
            <div class="card-img-wrap">${imgHtml}</div>
            <div class="card-body">
              <h3 class="card-title" style="font-size:0.95rem;">${title}</h3>
              <div class="card-meta"><span class="card-category">${category}</span><span class="card-year">${date}</span></div>
              <p style="font-size:0.75rem;color:var(--dark-gray);line-height:1.6;margin-top:0.5rem;">${summary}</p>
            </div>
          </div>`;
      }
    }).catch(e => console.error(e));
  </script>
</body>
</html>
